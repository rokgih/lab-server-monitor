name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for `git log -1` per file

      - name: Stage site
        run: |
          mkdir -p site/data
          cp index.html dashboard.js style.css site/
          # Build manifest with each file's last-commit time. The frontend
          # uses commit time (set by GitHub, always correct) as the source of
          # truth for staleness, and compares it to the master's recorded
          # generated_at to surface clock-skew warnings.
          files_json='[]'
          if [ -d data ] && compgen -G "data/*.json" > /dev/null; then
            for src in data/*.json; do
              name=$(basename "$src")
              cp "$src" "site/data/$name"
              committed_at=$(git log -1 --format=%cI -- "$src" 2>/dev/null || echo "")
              files_json=$(echo "$files_json" | jq --arg n "$name" --arg c "$committed_at" \
                '. + [{name:$n, committed_at:$c}]')
            done
          fi
          echo "{\"files\": $files_json}" > site/manifest.json
          cat site/manifest.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
